apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-cluster
spec:
  provider:
    vault:
      server: https://vault.seu.dominio # TODO: ajuste
      path: kv                        # engine KV v2
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes       # caminho do auth k8s no Vault
          role: eso                   # role com policy mínima
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
